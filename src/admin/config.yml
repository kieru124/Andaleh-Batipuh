# Auth DecapBridge PKCE (wajib)
backend:
  name: git-gateway
  repo: kieru124/Andaleh-Batipuh
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/ff086096-b4ca-409f-828d-0b9efff77c4c/pkce
  auth_token_endpoint: /sites/ff086096-b4ca-409f-828d-0b9efff77c4c/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Field PKCE (opsional, disarankan)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Tampilan
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://classy-tanuki-3a6635.netlify.app
locale: id

# Tempat penyimpanan foto
media_folder: src/img/uploads
public_folder: /img/uploads

# Menu konten di admin
collections:
  - name: berita
    label: Berita
    label_singular: Berita
    folder: src/berita/posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Judul, name: title, widget: string }
      - { label: Tanggal, name: date, widget: datetime, date_format: DD-MM-YYYY, time_format: false }
      - { label: Foto utama (opsional), name: thumbnail, widget: image, required: false }
      - { label: Isi berita, name: body, widget: markdown }
      - { label: Layout, name: layout, widget: hidden, default: post.njk }
